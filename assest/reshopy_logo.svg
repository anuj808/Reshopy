      <stop offset="100%" style="stop-color:#F48FB1"/>
    </linearGradient>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#fce4ec;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
